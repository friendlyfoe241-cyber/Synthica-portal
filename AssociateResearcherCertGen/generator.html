<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Associate Researcher Certificate</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a1628; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
  canvas { max-width:100%; border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  .btn { margin-top:20px; padding:14px 32px; background:linear-gradient(135deg,#c9a84c,#e8cc7a); color:#0a1628; border:none; border-radius:10px; font-weight:700; cursor:pointer; font-size:14px; }
  .btn:hover { opacity:0.9; }
  .name-display { color:#e8cc7a; font-size:14px; margin-bottom:20px; text-align:center; }
  .error { color:#ef4444; padding:20px; text-align:center; }
  .loading { color:#e8cc7a; padding:20px; text-align:center; }
</style>
</head>
<body>
<p class="name-display">Generating certificate for: <span id="name-display"></span></p>
<p id="status" class="loading">Loading certificate...</p>
<canvas id="preview-canvas"></canvas>
<button class="btn" id="download-btn" style="display:none">Download Certificate</button>

<script>
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name') || 'Unknown User';
  document.getElementById('name-display').textContent = name;

  async function generateCert() {
    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const btn = document.getElementById('download-btn');
    
    try {
      const tmpl = new Image();
      
      // Try multiple paths for the template
      const paths = ['./certificate-template.jpg', 'certificate-template.jpg', '../certificate-template.jpg'];
      let loaded = false;
      
      for (const path of paths) {
        console.log('Trying to load:', path);
        tmpl.src = path;
        await new Promise((resolve, reject) => {
          tmpl.onload = resolve;
          tmpl.onerror = () => reject(new Error('Failed to load: ' + path));
          setTimeout(reject, 3000); // 3 second timeout
        });
        loaded = true;
        console.log('Successfully loaded:', path);
        break;
      }
      
      if (!loaded) throw new Error('Could not load template from any path');

      // Wait for fonts
      await document.fonts.ready;
      
      const W = tmpl.naturalWidth || 1920;
      const H = tmpl.naturalHeight || 1080;
      canvas.width = W;
      canvas.height = H;
      
      // Draw template
      ctx.drawImage(tmpl, 0, 0, W, H);

      // Draw name
      let baseFontSize = Math.floor(W * 0.052);
      ctx.font = `700 ${baseFontSize}px "Cinzel", serif`;
      const maxTextWidth = W * 0.75;
      while (ctx.measureText(name).width > maxTextWidth && baseFontSize > 24) {
        baseFontSize -= 4;
        ctx.font = `700 ${baseFontSize}px "Cinzel", serif`;
      }

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#c9a84c';
      ctx.fillText(name, W / 2, H * 0.345);

      statusEl.style.display = 'none';
      btn.style.display = 'block';
      
      btn.addEventListener('click', function() {
        this.href = canvas.toDataURL('image/png');
        this.download = 'Associate-Researcher-Certificate.png';
        this.click();
      });
    } catch (err) {
      console.error('Error:', err);
      statusEl.textContent = 'Error: ' + err.message;
      statusEl.className = 'error';
      statusEl.style.display = 'block';
      
      // Create fallback certificate
      canvas.width = 800;
      canvas.height = 600;
      ctx.fillStyle = '#0a1628';
      ctx.fillRect(0, 0, 800, 600);
      ctx.fillStyle = '#c9a84c';
      ctx.font = '700 40px serif';
      ctx.textAlign = 'center';
      ctx.fillText('Certificate', 400, 200);
      ctx.font = '24px sans-serif';
      ctx.fillStyle = '#e8edf5';
      ctx.fillText(name, 400, 350);
      ctx.font = '16px sans-serif';
      ctx.fillText('Associate Researcher', 400, 420);
      
      btn.style.display = 'block';
      btn.addEventListener('click', function() {
        this.href = canvas.toDataURL('image/png');
        this.download = 'Associate-Researcher-Certificate.png';
        this.click();
      });
    }
  }

  generateCert();
</script>
</body>
</html>
