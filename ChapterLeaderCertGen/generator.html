<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter Leader Certificate</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a1628; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
  canvas { max-width:100%; border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  .btn { margin-top:20px; padding:14px 32px; background:linear-gradient(135deg,#c9a84c,#e8cc7a); color:#0a1628; border:none; border-radius:10px; font-weight:700; cursor:pointer; font-size:14px; }
  .btn:hover { opacity:0.9; }
  .name-display { color:#e8cc7a; font-size:14px; margin-bottom:20px; text-align:center; }
</style>
</head>
<body>
<p class="name-display">Certificate for: <span id="name-display"></span></p>
<canvas id="preview-canvas"></canvas>
<button class="btn" id="download-btn">Download Certificate</button>

<script>
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name') || 'Unknown User';
  document.getElementById('name-display').textContent = name;

  async function generateCert() {
    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');

    const tmpl = new Image();
    tmpl.src = 'certificate-template.jpg';

    await new Promise((resolve, reject) => {
      tmpl.onload = resolve;
      tmpl.onerror = () => {
        alert('Could not load certificate-template.jpg. Please ensure the image file is in the same folder as this HTML file.');
        reject(new Error('Image not found'));
      };
    });

    await document.fonts.ready;

    const W = tmpl.naturalWidth || 1920;
    const H = tmpl.naturalHeight || 1080;
    canvas.width = W;
    canvas.height = H;

    ctx.drawImage(tmpl, 0, 0, W, H);

    let baseFontSize = Math.floor(W * 0.052);
    ctx.font = `700 ${baseFontSize}px serif`;
    const maxTextWidth = W * 0.75;
    while (ctx.measureText(name).width > maxTextWidth && baseFontSize > 24) {
      baseFontSize -= 4;
      ctx.font = `700 ${baseFontSize}px serif`;
    }

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#c9a84c';
    ctx.fillText(name, W / 2, H * 0.345);
  }

  generateCert().then(() => {
    document.getElementById('download-btn').addEventListener('click', function() {
      const canvas = document.getElementById('preview-canvas');
      this.href = canvas.toDataURL('image/png');
      this.download = 'Chapter-Leader-Certificate.png';
      this.click();
    });
  }).catch(() => {
    document.getElementById('download-btn').addEventListener('click', function() {
      const canvas = document.getElementById('preview-canvas');
      this.href = canvas.toDataURL('image/png');
      this.download = 'Chapter-Leader-Certificate.png';
      this.click();
    });
  });
</script>
</body>
</html>
