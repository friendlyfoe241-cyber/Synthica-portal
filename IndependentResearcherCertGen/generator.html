<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Independent Researcher Certificate</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a1628; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
  canvas { max-width:100%; border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  .btn { margin-top:20px; padding:14px 32px; background:linear-gradient(135deg,#c9a84c,#e8cc7a); color:#0a1628; border:none; border-radius:10px; font-weight:700; cursor:pointer; font-size:14px; }
  .btn:hover { opacity:0.9; }
  .name-display { color:#e8cc7a; font-size:14px; margin-bottom:20px; text-align:center; }
</style>
</head>
<body>
<p class="name-display">Certificate for: <span id="name-display"></span></p>
<canvas id="preview-canvas"></canvas>
<button class="btn" id="download-btn">Download Certificate</button>

<script>
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name') || 'Unknown User';
  document.getElementById('name-display').textContent = name;

  function drawCertificate() {
    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');
    const W = 1200, H = 800;
    canvas.width = W;
    canvas.height = H;

    // Background
    ctx.fillStyle = '#0a1628';
    ctx.fillRect(0, 0, W, H);

    // Border
    ctx.strokeStyle = '#c9a84c';
    ctx.lineWidth = 4;
    ctx.strokeRect(20, 20, W - 40, H - 40);
    ctx.lineWidth = 2;
    ctx.strokeRect(30, 30, W - 60, H - 60);

    // Header
    ctx.fillStyle = '#c9a84c';
    ctx.font = 'bold 24px serif';
    ctx.textAlign = 'center';
    ctx.fillText('SYNTHICA', W / 2, 80);

    // Decorative line
    ctx.strokeStyle = '#c9a84c';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W / 2 - 100, 100);
    ctx.lineTo(W / 2 + 100, 100);
    ctx.stroke();

    // Title
    ctx.font = 'bold 48px serif';
    ctx.fillText('CERTIFICATE OF ACHIEVEMENT', W / 2, 180);

    // Subtitle
    ctx.font = '20px serif';
    ctx.fillStyle = '#7a8ba8';
    ctx.fillText('This certifies that', W / 2, 280);

    // Name
    ctx.font = 'bold 56px serif';
    ctx.fillStyle = '#e8cc7a';
    ctx.fillText(name, W / 2, 380);

    // Underline for name
    ctx.strokeStyle = '#c9a84c';
    ctx.lineWidth = 2;
    const nameWidth = ctx.measureText(name).width;
    ctx.beginPath();
    ctx.moveTo(W / 2 - nameWidth / 2 - 20, 400);
    ctx.lineTo(W / 2 + nameWidth / 2 + 20, 400);
    ctx.stroke();

    // Achievement text
    ctx.font = '20px serif';
    ctx.fillStyle = '#7a8ba8';
    ctx.fillText('has successfully completed requirements for', W / 2, 480);

    // Role
    ctx.font = 'bold 36px serif';
    ctx.fillStyle = '#c9a84c';
    ctx.fillText('INDEPENDENT RESEARCHER', W / 2, 560);

    // Date
    const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    ctx.font = '16px serif';
    ctx.fillStyle = '#7a8ba8';
    ctx.fillText('Awarded on ' + date, W / 2, 700);

    // Footer logo
    ctx.font = '14px serif';
    ctx.fillText('Synthica Research Network', W / 2, 750);
  }

  drawCertificate();

  document.getElementById('download-btn').addEventListener('click', function() {
    const canvas = document.getElementById('preview-canvas');
    this.href = canvas.toDataURL('image/png');
    this.download = 'Independent-Researcher-Certificate.png';
    this.click();
  });
</script>
</body>
</html>
